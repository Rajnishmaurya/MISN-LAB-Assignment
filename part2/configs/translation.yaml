# ── Data ──────────────────────────────────────────────────────────────────────
# Bidirectional .src/.tgt files (copied from Part 1 into part2/data/)
train_src: data/train.src
train_tgt: data/train.tgt
valid_src: data/valid.src
valid_tgt: data/valid.tgt
test_src:  data/test.src
test_tgt:  data/test.tgt
spm_model: spm_part2.model   # Part 2 tokenizer — same vocab as pretraining

# ── Pretrained checkpoints ────────────────────────────────────────────────────
bert_checkpoint: checkpoints/bert_pretrained_best.pt
gpt_checkpoint:  checkpoints/gpt_pretrained_best.pt

# ── Encoder (BERT backbone, ~100M, GQA kv_heads=4) ───────────────────────────
enc_hidden_dim:    768
enc_num_layers:     12
enc_num_heads:      12
enc_num_kv_heads:    4    # must match bert_pretrain.yaml num_kv_heads
enc_ffn_dim:      3072

# ── Decoder (GPT backbone + cross-attn, ~124M) ───────────────────────────────
dec_hidden_dim:        768
dec_num_layers:         16
dec_num_heads:          12
dec_num_kv_heads:        4    # self-attention GQA
dec_num_kv_heads_cross:  4    # cross-attention GQA
dec_ffn_dim:          3072

# ── Sequence ─────────────────────────────────────────────────────────────────
vocab_size:    16000
max_seq_len:    128
pad_id:           0
dropout:          0.1

# ── Training ─────────────────────────────────────────────────────────────────
batch_size:         64    # A100 — encoder + decoder in memory simultaneously
accumulation_steps:  2    # effective batch = 128
epochs:              5
lr:             5.0e-5    # lower LR for fine-tuning pretrained models
min_lr:         1.0e-6
warmup_ratio:     0.05
label_smoothing:   0.1
seed:               42

# ── System ────────────────────────────────────────────────────────────────────
num_workers:  4
amp_dtype:    bfloat16
